<!DOCTYPE html>
<html>
<head>
    <title>For Alina ❤️</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            overflow: hidden;
        }

        h1 {
            margin-top: 100px;
            font-size: 35px;
            color: white;
        }

        h2 {
            color: white;
        }

        .btn {
            padding: 15px 30px;
            font-size: 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            position: absolute;
            transition: 0.3s;
        }

        #yes {
            background: green;
            color: white;
            left: 40%;
            top: 55%;
        }

        #no {
            background: red;
            color: white;
            left: 55%;
            top: 55%;
        }
    </style>
</head>

<body>

<h1>Alina Khan ❤️</h1>
<h2>Will You Be Mine? 💕</h2>
<p style="color:white; font-size:18px;">From Abdur Rehman 💖</p>

<button id="yes" class="btn" onclick="yesClick()">Yes 💍</button>
<button id="no" class="btn" onmouseover="moveButton()">No 😜</button>

<script>
    function yesClick() {
        document.body.innerHTML = `
        <h1 style="margin-top:150px; color:white;">
        Yayyyy Alina! 💖<br><br>
        Abdur Rehman Loves You Forever ❤️
        </h1>`;
    }

    function moveButton() {
        var x = Math.random() * (window.innerWidth - 100);
        var y = Math.random() * (window.innerHeight - 100);

        document.getElementById("no").style.left = x + "px";
        document.getElementById("no").style.top = y + "px";
    }
</script>

</body>
</html>
